# ═══════════════════════════════════════════════════════════════════
#  D-Vision CI/CD Pipeline
#  Triggers on every push to main → builds Docker image →
#  pushes to Azure Container Registry → deploys to App Service
#  NOTE: Uses service connections AzureContainerRegistry + AzureServiceConnection
# ═══════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main          # Auto-deploy on every push to main branch

pool:
  vmImage: 'ubuntu-latest'

# ─── Pipeline Variables ────────────────────────────────────────────
# Replace these with YOUR actual values
variables:
  ACR_NAME: 'dvisionacr'                        # Your ACR name (no .azurecr.io)
  IMAGE_NAME: 'dvision-app'                     # Docker image name
  APP_SERVICE_NAME: 'dvision-app-service'       # Your Azure App Service name
  RESOURCE_GROUP: 'dvision-rg'                  # Your Azure Resource Group
  ACR_LOGIN_SERVER: '$(ACR_NAME).azurecr.io'   # Full ACR URL (auto-built)
  IMAGE_TAG: '$(Build.BuildId)'                 # Unique tag per build

# ─── Stages ───────────────────────────────────────────────────────
stages:

# ══════════════════════════════════════════
# STAGE 1: Build & Push Docker Image to ACR
# ══════════════════════════════════════════
- stage: Build
  displayName: '🐳 Build & Push Docker Image'
  jobs:
  - job: BuildAndPush
    displayName: 'Build image and push to ACR'
    steps:

    # Step 1-3: Login to ACR, build, and push using AzureServiceConnection
    # (Avoids needing a separate Docker Registry service connection)
    - task: AzureCLI@2
      displayName: 'Login to ACR + Build & Push Docker Image'
      inputs:
        azureSubscription: 'AzureServiceConnection'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail
          az acr login --name "$(ACR_NAME)"

          docker build \
            -f Dockerfile \
            -t "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)" \
            -t "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):latest" \
            .

          docker push "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)"
          docker push "$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):latest"

# ══════════════════════════════════════════
# STAGE 2: Deploy to Azure App Service
# ══════════════════════════════════════════
- stage: Deploy
  displayName: '🚀 Deploy to App Service'
  dependsOn: Build          # Only runs if Build stage succeeded
  condition: succeeded()
  jobs:
  - deployment: DeployToAppService
    displayName: 'Deploy container to App Service'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          # Step 4: Deploy the container image to Azure App Service
          - task: AzureWebAppContainer@1
            displayName: 'Deploy to App Service'
            inputs:
              azureSubscription: 'AzureServiceConnection'    # ← Service connection name
              appName: '$(APP_SERVICE_NAME)'
              resourceGroupName: '$(RESOURCE_GROUP)'
              containers: '$(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(IMAGE_TAG)'
