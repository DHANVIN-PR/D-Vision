<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - D Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <!-- Navigation -->
    <nav class="bg-gray-800 p-4 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold text-white">D Vision</h1>
        <a href="/" class="px-4 py-2 bg-blue-500 rounded hover:bg-blue-600 transition">🏠 Home</a>
    </nav>

    <!-- Login Form -->
    <div class="flex flex-col items-center justify-center h-screen">
        <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
            <h2 class="text-3xl font-bold text-center text-blue-300">🔑 Login</h2>

            <!-- Flash Messages (if error) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="bg-red-500 text-white p-2 my-2 rounded text-center">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="mt-6">
                <input type="email" name="email" placeholder="📧 Email" required class="w-full p-3 bg-gray-700 rounded mb-4">
                <input type="password" name="password" placeholder="🔑 Password" required class="w-full p-3 bg-gray-700 rounded mb-4">
                <button type="submit" class="w-full bg-green-500 py-3 rounded-lg hover:bg-green-600 transition">
                    🚀 Login
                </button>
            </form>

            <p class="text-gray-400 text-center mt-4">New here?  
                <a href="/register" class="text-blue-400 hover:underline">Register now</a>
            </p>
        </div>
    </div>

</body>
</html>
