<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Dashboard - D Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200">

    <!-- Navbar -->
    <nav class="bg-gray-800 p-4 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold text-white">D Vision</h1>
        <a href="{{ url_for('logout') }}" class="bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 transition">🚪 Logout</a>
    </nav>

    <!-- Main Container -->
    <div class="max-w-5xl mx-auto mt-8 p-6 bg-gray-800 rounded-lg shadow-lg">
        <h2 class="text-3xl font-semibold text-blue-400">📚 Manage Your Courses</h2>

        <!-- Course Posting Form -->
        <form method="POST" action="{{ url_for('post_course') }}" enctype="multipart/form-data" 
              class="mt-6 bg-gray-700 p-6 rounded-lg shadow-md space-y-4">
            <input type="text" name="title" placeholder="📖 Course Title" required 
                   class="w-full p-2 bg-gray-600 border border-gray-500 rounded-md text-gray-200">

            <textarea name="description" placeholder="✍ Course Description" required 
                      class="w-full p-2 bg-gray-600 border border-gray-500 rounded-md text-gray-200"></textarea>

            <select name="category" required class="w-full p-2 bg-gray-600 border border-gray-500 rounded-md text-gray-200">
                {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>

            <label class="block text-gray-300">📂 Upload Materials</label>
            <input type="file" name="materials" class="w-full bg-gray-600 text-gray-300 border border-gray-500 rounded-md p-2">

            <button type="submit" 
                    class="w-full bg-green-500 text-white py-2 rounded-md hover:bg-green-600 transition">
                ✅ Post Course
            </button>
        </form>

        <!-- Tutor Clusters Button -->
        <div class="mt-8 text-right">
            <a href="{{ url_for('tutor_clusters') }}" 
               class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-4 rounded inline-block">
                🔍 View Tutor Clusters
            </a>
        </div>

        <!-- Display Existing Courses -->
        <h2 class="text-3xl font-semibold text-blue-400 mt-10">📋 Your Courses</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
            {% for course in courses %}
            <div class="bg-gray-700 p-4 rounded-lg shadow-md hover:shadow-lg transition">
                <h3 class="text-xl font-semibold text-blue-300">{{ course.title }}</h3>
                <p class="text-gray-300 mt-2">{{ course.description }}</p>
                <p class="text-yellow-400 mt-2">📂 Category: {{ course.category }}</p>

                <form method="POST" action="{{ url_for('delete_course', course_id=course.id) }}" class="mt-4">
                    <button type="submit" 
                            class="w-full bg-red-500 text-white py-2 rounded-md hover:bg-red-600 transition">
                        ❌ Delete Course
                    </button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
