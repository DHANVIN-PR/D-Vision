<!DOCTYPE html>
<html>
<head>
    <title>Tutor Clusters by Category</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">🧠 Tutor Clusters by Category</h1>

    <div class="overflow-x-auto">
        <table class="table-auto mx-auto w-full max-w-4xl bg-white shadow rounded">
            <thead class="bg-indigo-200">
                <tr>
                    <th class="px-4 py-2 text-left">Tutor Name</th>
                    <th class="px-4 py-2">Email</th>
                    <th class="px-4 py-2">Cluster</th>
                </tr>
            </thead>
            <tbody>
                {% for tutor in clusters %}
                <tr class="border-b text-center">
                    <td class="py-2 px-4">{{ tutor.name }}</td>
                    <td class="py-2 px-4">{{ tutor.email }}</td>
                    <td class="py-2 px-4 text-indigo-600 font-semibold">Cluster {{ tutor.cluster }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-6 text-center">
        <a href="{{ url_for('dashboard') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded">
            ← Back to Dashboard
        </a>
    </div>
</body>
</html>
