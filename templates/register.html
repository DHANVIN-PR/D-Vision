<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - D Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex justify-center items-center min-h-screen">

    <!-- Registration Form Container -->
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold text-blue-300 text-center mb-6">🚀 Create an Account</h2>

        <form method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Full Name" required
                   class="w-full p-3 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <input type="email" name="email" placeholder="Email" required
                   class="w-full p-3 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

            <input type="password" name="password" placeholder="Password" required
                   class="w-full p-3 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

            <!-- ✅ New Fields -->
            <input type="text" name="location" placeholder="Location" required
                   class="w-full p-3 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

            <input type="text" name="phone" placeholder="Phone Number" required
                   class="w-full p-3 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <select name="role" class="w-full p-3 bg-gray-700 text-white rounded">
                <option value="student">📘 Student</option>
                <option value="tutor">🎓 Tutor</option>
            </select>

            <button type="submit" class="w-full bg-green-500 py-2 rounded-lg hover:bg-green-600 transition">
                ✅ Register
            </button>
        </form>

        <p class="text-center mt-4 text-gray-400">Already have an account? 
            <a href="/login" class="text-blue-400 hover:underline">Login here</a>
        </p>
    </div>

</body>
</html>
